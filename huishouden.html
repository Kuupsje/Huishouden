<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --surface2: #F0EDE6;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.13);
  --text: #1A1814;
  --text2: #6B665C;
  --text3: #A09B90;
  --green: #2D6A4F;
  --green-light: #D8EDDF;
  --green-mid: #74C69D;
  --amber: #92400E;
  --amber-light: #FEF3C7;
  --blue: #1E3A5F;
  --blue-light: #DBEAFE;
  --rose: #9F1239;
  --rose-light: #FFE4E6;
  --purple: #4C1D95;
  --purple-light: #EDE9FE;
  --teal: #134E4A;
  --teal-light: #CCFBF1;
  --radius: 16px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100%;
  font-size: 15px;
  line-height: 1.5;
  -webkit-text-size-adjust: 100%;
  overscroll-behavior-y: none;
}

/* INSTALL BANNER */
.install-banner {
  display: none;
  background: #2D6A4F;
  color: white;
  padding: 12px 16px;
  padding-top: calc(12px + var(--safe-top));
  font-size: 13px;
  gap: 10px;
  align-items: flex-start;
}
.install-banner.show { display: flex; }
.install-text { flex: 1; line-height: 1.45; }
.install-text strong { display: block; margin-bottom: 2px; font-weight: 500; }
.install-steps { opacity: .85; font-size: 12px; }
.install-close {
  background: rgba(255,255,255,0.2); border: none; color: white;
  width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}

/* HEADER */
.header {
  background: var(--text);
  color: #F7F5F0;
  padding: 16px 16px 14px;
  padding-top: calc(16px + var(--safe-top));
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 12px;
}
.header h1 {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 26px;
  font-weight: 400;
  letter-spacing: -0.3px;
  color: #F7F5F0;
  line-height: 1.1;
}
.header h1 span { color: var(--green-mid); }
.header-date { font-size: 12px; color: rgba(247,245,240,0.4); margin-top: 3px; }
.reset-btn {
  font-size: 12px;
  color: rgba(247,245,240,0.4);
  background: none;
  border: 1px solid rgba(247,245,240,0.12);
  border-radius: 100px;
  padding: 5px 11px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  margin-top: 2px;
  min-height: 30px;
}
.reset-btn:active { background: rgba(247,245,240,0.08); }

/* PROGRESS */
.prog-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.prog-outer {
  flex: 1;
  height: 3px;
  background: rgba(247,245,240,0.1);
  border-radius: 3px;
  overflow: hidden;
}
.prog-inner {
  height: 100%;
  background: var(--green-mid);
  border-radius: 3px;
  transition: width .5s ease;
}
.prog-txt { font-size: 12px; color: rgba(247,245,240,0.4); white-space: nowrap; }

/* WEEK NAV */
.week-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid rgba(247,245,240,0.15);
  background: rgba(247,245,240,0.06);
  color: rgba(247,245,240,0.65);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-family: 'DM Sans', sans-serif;
  transition: background .15s;
}
.nav-btn:active { background: rgba(247,245,240,0.15); }
.nav-btn:disabled { opacity: .2; cursor: default; }
.week-info { flex: 1; }
.week-num { font-size: 14px; font-weight: 500; color: #F7F5F0; }
.week-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.wbadge {
  font-size: 10px; padding: 2px 7px; border-radius: 100px;
  font-weight: 500; letter-spacing: .02em;
}
.wbadge-groep { background: rgba(116,198,157,0.18); color: var(--green-mid); }
.wbadge-maand { background: rgba(245,158,11,0.18); color: #F59E0B; }
.wbadge-kw    { background: rgba(248,113,113,0.18); color: #F87171; }

/* DOTS */
.dots-row {
  display: flex; gap: 5px; flex-wrap: wrap;
  padding: 8px 16px 10px;
  background: var(--text);
}
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(247,245,240,0.1);
  cursor: pointer; border: none; padding: 0;
  transition: all .2s;
}
.dot.cur { background: var(--green-mid); transform: scale(1.25); }
.dot.partial { background: rgba(116,198,157,0.35); }

/* MAIN */
.main {
  padding: 10px 12px;
  padding-bottom: calc(24px + var(--safe-bottom));
}

/* DAY CARD */
.day-card {
  background: var(--surface);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.day-head {
  display: flex;
  align-items: center;
  padding: 13px 14px;
  cursor: pointer;
  gap: 10px;
  min-height: 52px;
}
.day-head:active { background: var(--surface2); }
.day-icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
.day-name-wrap { flex: 1; }
.day-name { font-size: 15px; font-weight: 500; }
.day-meta-txt { font-size: 11px; color: var(--text3); margin-top: 1px; }
.day-right { display: flex; align-items: center; gap: 8px; }
.day-count { font-size: 12px; color: var(--text3); }
.day-arrow { font-size: 14px; color: var(--text3); transition: transform .2s; }
.day-arrow.open { transform: rotate(90deg); }

/* SLOT */
.slot-group { border-top: 1px solid var(--border); }
.slot-header {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 14px 4px;
  background: var(--surface2);
}
.slot-time { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: .06em; min-width: 36px; text-transform: uppercase; }
.slot-divider { flex: 1; height: 1px; background: var(--border2); }
.slot-name { font-size: 10px; color: var(--text3); letter-spacing: .04em; text-transform: uppercase; }

/* TASK */
.task {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 11px 14px;
  cursor: pointer;
  background: var(--surface);
  border-top: 1px solid var(--border);
  min-height: 48px;
  transition: background .1s;
}
.task:active { background: var(--surface2); }
.task.done { opacity: .32; }
.task.done .task-label { text-decoration: line-through; color: var(--text3); }

.checkbox {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  flex-shrink: 0;
  margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all .18s;
}
.task.done .checkbox { background: var(--green); border-color: var(--green); }
.checkmark { display: none; }
.task.done .checkmark { display: block; }

.task-body { flex: 1; min-width: 0; }
.task-label { font-size: 14px; color: var(--text); line-height: 1.4; }
.task-note { font-size: 11px; color: var(--text3); margin-top: 2px; }

.chip {
  font-size: 10px; padding: 3px 8px; border-radius: 100px;
  font-weight: 500; flex-shrink: 0; margin-top: 2px;
  letter-spacing: .02em; text-transform: uppercase; white-space: nowrap;
}
.chip-hond   { background: var(--teal-light);   color: var(--teal); }
.chip-was    { background: var(--blue-light);    color: var(--blue); }
.chip-bed    { background: var(--rose-light);    color: var(--rose); }
.chip-schoon { background: var(--surface2);      color: var(--text2); border: 1px solid var(--border2); }
.chip-tuin   { background: var(--green-light);   color: var(--green); }
.chip-bood   { background: var(--amber-light);   color: var(--amber); }
.chip-kliko  { background: var(--rose-light);    color: var(--rose); }
.chip-kw     { background: var(--purple-light);  color: var(--purple); }
.chip-koken  { background: var(--amber-light);   color: var(--amber); }

.sun-note {
  padding: 11px 14px;
  font-size: 13px; color: var(--text3);
  font-style: italic;
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>

<!-- Install banner (shown when not in standalone mode) -->
<div class="install-banner" id="installBanner">
  <div class="install-text">
    <strong>Zet op je beginscherm</strong>
    <span class="install-steps">Tik op <strong>Deel</strong> (vakje met pijltje) → <strong>Zet op beginscherm</strong></span>
  </div>
  <button class="install-close" onclick="dismissBanner()">✕</button>
</div>

<div class="header">
  <div class="header-top">
    <div>
      <h1>Huis<span>houden</span></h1>
      <div class="header-date" id="headerDate"></div>
    </div>
    <button class="reset-btn" onclick="resetWeek()">Reset week</button>
  </div>
  <div class="prog-row">
    <div class="prog-outer"><div class="prog-inner" id="pbar"></div></div>
    <div class="prog-txt" id="plabel"></div>
  </div>
  <div class="week-nav">
    <button class="nav-btn" id="prevBtn" onclick="changeWeek(-1)">‹</button>
    <div class="week-info">
      <div class="week-num" id="weekNum"></div>
      <div class="week-badges" id="weekBadges"></div>
    </div>
    <button class="nav-btn" id="nextBtn" onclick="changeWeek(1)">›</button>
  </div>
</div>
<div class="dots-row" id="dots"></div>
<div class="main" id="main"></div>

<script>
const KEY = 'huis_pwa_v1';
let curWeek = 1;
const TOTAL = 13;
const collapsed = {};

const O='06:30', BO='09:00', M='13:00', T='17:00', E='18:30', N='20:30';
const SLOTS = [O, BO, M, T, E, N];
const SLOT_NAMES = {[O]:'Ochtend',[BO]:'Voormiddag',[M]:'Middag',[T]:'Thuis',[E]:'Avond',[N]:'Na het eten'};
const BL = {hond:'Honden',was:'Was',bed:'Bed',schoon:'Schoon',tuin:'Tuin',bood:'Boodschappen',kliko:'Kliko!',kw:'Kwartaal',koken:'Koken'};
const DAG_ICONS = {Maandag:'☀️',Dinsdag:'👨‍👧‍👦',Woensdag:'🧺',Donderdag:'🚽',Vrijdag:'🎉',Zaterdag:'🏡',Zondag:'🌿'};
const DAG_META = {
  Maandag:'Werk · was op de machine',
  Dinsdag:'Werk · kliko + groepsavond (+2 kinderen)',
  Woensdag:'Werk · was + badkamer',
  Donderdag:'Werk · toiletten + stofzuigen',
  Vrijdag:'Werk · was + dweilen',
  Zaterdag:'Weekend · klussen klaar voor 17:00',
  Zondag:'Rustdag',
};

function isGroot(w){return w%2===0;}
function isMaand(w){return[1,5,9,13].includes(w);}
function isKw(w){return[1,7].includes(w);}
function getBed(w,dag){
  const c=w%2===1?{Vrijdag:'Jesse',Zaterdag:'Bram',Zondag:'Thom'}:{Vrijdag:'Daan',Zaterdag:'Sanne',Zondag:'Wij'};
  return c[dag]||'';
}
function t(label,badge,note,slot){return{label,badge,note,slot};}

const hondenO=[t('Honden voeren (ochtend)','hond','',O),t('Honden uitlaten — 08:00','hond','Voor het werk',O)];
const hondenM=[t('Honden uitlaten — 13:00','hond','Middagpauze',M)];
const hondenT=[t('Honden uitlaten — 17:00','hond','',T)];
const hondenAvond=[t('Honden voeren (avond)','hond','',E),t('Honden uitlaten — 20:00','hond','',N)];
const keukenO=[t('Vaatwasser uitruimen','schoon','',O)];
const keukenN=[
  t('Koken / tafel dekken','koken','',E),
  t('Aanrecht & kookplaat afnemen','schoon','Na het eten',N),
  t('Tafel afnemen','schoon','',N),
  t('Vaatwasser inruimen & aanzetten','schoon','',N),
  t('Keuken stofzuigen','schoon','',N),
];
function werkdag(extra){return[...hondenO,...keukenO,...hondenM,...hondenT,...hondenAvond,...keukenN,...(extra||[])];}

function makeWeek(w){
  const groot=isGroot(w),maand=isMaand(w),kw=isKw(w);
  const bedVr=getBed(w,'Vrijdag'),bedZa=getBed(w,'Zaterdag'),bedZo=getBed(w,'Zondag');

  const ma=werkdag([
    t('Was draaien — lading 1','was','Vóór vertrek aanzetten',O),
    t('Was draaien — lading 2','was','',O),
    t('Was ophangen / droger','was','Direct na thuiskomst',T),
    t('Was vouwen & opbergen','was','',T),
    t('Koelkast controleren & opruimen','schoon','',T),
    t('Stofzuigen (beneden)','schoon','',T),
  ]);
  const di=werkdag([
    t('Stofzuigen (boven + slaapkamers)','schoon','',T),
    t('Kliko aan de weg zetten','kliko','Dinsdagavond!',E),
    t('Koken voor groep','koken','+2 extra kinderen eten mee',E),
    t('Toiletten reinigen','schoon','Na het avondeten',N),
    t('Keuken grondig schoonmaken','schoon','Na grote maaltijd',N),
  ]);
  const wo=werkdag([
    t('Was draaien — lading 1','was','Vóór vertrek aanzetten',O),
    t('Was draaien — lading 2','was','',O),
    t('Was ophangen / droger','was','Direct na thuiskomst',T),
    t('Stof afnemen meubels','schoon','',T),
    t('Badkamer 1 schoonmaken','schoon','Douche / wastafel / spiegel',T),
    t('Handdoeken wisselen & prullenbakken legen','schoon','',T),
    t('Was vouwen & opbergen','was','',E),
  ]);
  const do_=werkdag([
    t('Toilet beneden schoonmaken','schoon','',T),
    t('Toilet boven (badkamer) schoonmaken','schoon','',T),
    t('Apart toilet boven schoonmaken','schoon','',T),
    t('Stofzuigen (woonkamer + gang)','schoon','',T),
  ]);
  const vr=werkdag([
    t('Was draaien — lading 1','was','Vóór vertrek aanzetten',O),
    t('Was draaien — lading 2','was','',O),
    t('Bed verschonen — '+bedVr,'bed','',O),
    t('Was ophangen / droger','was','Direct na thuiskomst',T),
    t('Was vouwen & opbergen','was','',T),
    t('Vloeren dweilen (beneden)','schoon','',T),
    ...(groot?[
      t('Boodschappen voor groot weekend ophalen','bood','Voor vrijdagavond',T),
      t('Koken voor grote groep (vr-avond)','koken','Grote vrijdagavond',E),
      t('Keuken schoonmaken na grote maaltijd','schoon','',N),
    ]:[
      t('Koken / tafel dekken','koken','',E),
      t('Aanrecht & kookplaat afnemen','schoon','',N),
      t('Vaatwasser inruimen & aanzetten','schoon','',N),
    ]),
  ]);

  const za=[
    ...hondenO,...keukenO,
    t('Was draaien — lading 1','was','Meteen aanzetten',O),
    t('Was draaien — lading 2','was','',O),
    t('Boodschappen + glas & papier wegbrengen','bood','Zaterdagochtend',O),
    t('Was ophangen / droger','was','Na boodschappen',BO),
    t('Bed verschonen — '+bedZa,'bed','',BO),
    t('Badkamer 2 schoonmaken','schoon','Douche / wastafel / spiegel',BO),
    t('Stofzuigen (woonkamer + gang)','schoon','',BO),
    t('Tuin bijhouden','tuin','Gras, onkruid, paden',BO),
    t('Was vouwen & opbergen','was','',M),
  ];
  if(maand){
    za.push(t('Koelkast grondig schoonmaken','schoon','Maandelijks',M));
    za.push(t('Oven schoonmaken','schoon','Maandelijks',M));
    za.push(t('Ramen lappen (binnen + buiten)','schoon','Maandelijks',M));
    za.push(t('Garage / bijkeuken opruimen','schoon','Maandelijks',M));
    za.push(t('Auto wassen','schoon','Maandelijks',M));
  }
  if(kw){
    za.push(t('Hondenmanden stofzuigen','kw','Per kwartaal',M));
    za.push(t('Matrassen controleren / omdraaien','kw','Per kwartaal',M));
    za.push(t('Keukenkastjes afnemen van binnen','kw','Per kwartaal',M));
  }
  za.push(...hondenM,...hondenT,...hondenAvond);
  if(groot){
    za.push(t('Koken / tafel dekken (za-avond grote groep)','koken','',E));
    za.push(t('Aanrecht & kookplaat afnemen','schoon','Na het eten',N));
    za.push(t('Tafel afnemen','schoon','',N));
    za.push(t('Vaatwasser inruimen & aanzetten','schoon','',N));
  } else {
    za.push(t('Koken / tafel dekken','koken','',E));
    za.push(t('Aanrecht & kookplaat afnemen','schoon','',N));
    za.push(t('Vaatwasser inruimen & aanzetten','schoon','',N));
  }

  const zo=[...hondenO,...keukenO,t('Bed verschonen — '+bedZo,'bed','',O),...hondenM];
  if(groot){
    zo.push(t('Koken (zo-middag grote groep)','koken','Zondagmiddag',M));
    zo.push(t('Keuken licht opruimen na middag','schoon','',M));
    zo.push(...hondenT,...hondenAvond);
    zo.push(t('Koken (zo-avond grote groep)','koken','Zondagavond',E));
    zo.push(t('Aanrecht & kookplaat afnemen','schoon','',N));
    zo.push(t('Vaatwasser inruimen & aanzetten','schoon','',N));
  } else {
    zo.push(...hondenT,...hondenAvond);
    zo.push(t('Koken / tafel dekken','koken','',E));
    zo.push(t('Aanrecht & kookplaat afnemen','schoon','',N));
    zo.push(t('Vaatwasser inruimen & aanzetten','schoon','',N));
  }
  return{Maandag:ma,Dinsdag:di,Woensdag:wo,Donderdag:do_,Vrijdag:vr,Zaterdag:za,Zondag:zo};
}

function getState(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):{};}catch(e){return{};}}
function saveState(s){try{localStorage.setItem(KEY,JSON.stringify(s));}catch(e){}}
function toggle(week,dag,idx){
  const s=getState();const k=`w${week}_${dag}`;
  if(!s[k])s[k]={};s[k][idx]=!s[k][idx];
  saveState(s);render();
}
function resetWeek(){
  if(!confirm(`Week ${curWeek} resetten?`))return;
  const s=getState();
  ['Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag','Zondag'].forEach(d=>delete s[`w${curWeek}_${d}`]);
  saveState(s);render();
}
function changeWeek(d){curWeek=Math.max(1,Math.min(TOTAL,curWeek+d));render();}
function weekProg(w,state){
  const days=makeWeek(w);let tot=0,dn=0;
  Object.entries(days).forEach(([dag,tasks])=>{
    const k=`w${w}_${dag}`;
    tasks.forEach((_,i)=>{tot++;if(state[k]&&state[k][i])dn++;});
  });
  return{tot,dn};
}
function dismissBanner(){
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('banner_dismissed','1');
}

function render(){
  const state=getState();
  const d=new Date();
  document.getElementById('headerDate').textContent=
    d.toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'});

  // Install banner
  const isStandalone=window.navigator.standalone===true;
  const dismissed=localStorage.getItem('banner_dismissed');
  if(!isStandalone&&!dismissed){
    document.getElementById('installBanner').classList.add('show');
  }

  document.getElementById('weekNum').textContent=`Week ${curWeek} van ${TOTAL}`;
  const b=[];
  if(isGroot(curWeek))b.push('<span class="wbadge wbadge-groep">Grote groep</span>');
  if(isMaand(curWeek))b.push('<span class="wbadge wbadge-maand">Maandtaken</span>');
  if(isKw(curWeek))b.push('<span class="wbadge wbadge-kw">Kwartaaltaken</span>');
  document.getElementById('weekBadges').innerHTML=b.join('');
  document.getElementById('prevBtn').disabled=curWeek<=1;
  document.getElementById('nextBtn').disabled=curWeek>=TOTAL;

  const dotsEl=document.getElementById('dots');dotsEl.innerHTML='';
  for(let w=1;w<=TOTAL;w++){
    const{tot,dn}=weekProg(w,state);
    const dot=document.createElement('button');
    dot.className='dot'+(w===curWeek?' cur':dn>0&&dn<tot?' partial':'');
    dot.title=`Week ${w}`;
    dot.onclick=(ww=>()=>{curWeek=ww;render();})(w);
    dotsEl.appendChild(dot);
  }

  let totalAll=0,doneAll=0;
  for(let w=1;w<=TOTAL;w++){const p=weekProg(w,state);totalAll+=p.tot;doneAll+=p.dn;}
  const pct=totalAll?Math.round(doneAll/totalAll*100):0;
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('plabel').textContent=`${doneAll} / ${totalAll}`;

  const days=makeWeek(curWeek);
  const dagNamen=['Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag','Zondag'];
  const main=document.getElementById('main');main.innerHTML='';

  dagNamen.forEach(dag=>{
    const raw=days[dag]||[];
    const k=`w${curWeek}_${dag}`;
    const wd=raw.map((t,i)=>({...t,done:!!(state[k]&&state[k][i])}));
    const done=wd.filter(t=>t.done).length;
    const isOpen=!collapsed[`${curWeek}_${dag}`];

    const card=document.createElement('div');card.className='day-card';
    const head=document.createElement('div');head.className='day-head';
    head.innerHTML=`
      <span class="day-icon">${DAG_ICONS[dag]||'📅'}</span>
      <div class="day-name-wrap">
        <div class="day-name">${dag}</div>
        <div class="day-meta-txt">${DAG_META[dag]||''}</div>
      </div>
      <div class="day-right">
        <span class="day-count">${done}/${wd.length}</span>
        <span class="day-arrow${isOpen?' open':''}">›</span>
      </div>`;
    head.onclick=()=>{collapsed[`${curWeek}_${dag}`]=!collapsed[`${curWeek}_${dag}`];render();};
    card.appendChild(head);

    if(isOpen){
      if(dag==='Zondag'){
        const note=document.createElement('div');note.className='sun-note';
        note.textContent=isGroot(curWeek)?'Rustdag — honden, bed en koken (grote groep).':'Rustdag — alleen honden, bed en koken.';
        card.appendChild(note);
      }
      const grouped={};SLOTS.forEach(s=>grouped[s]=[]);
      wd.forEach((t,i)=>{if(grouped[t.slot]!==undefined)grouped[t.slot].push({...t,idx:i});});
      SLOTS.forEach(slot=>{
        const st=grouped[slot];if(!st||!st.length)return;
        const wrap=document.createElement('div');wrap.className='slot-group';
        const sh=document.createElement('div');sh.className='slot-header';
        sh.innerHTML=`<span class="slot-time">${slot}</span><div class="slot-divider"></div><span class="slot-name">${SLOT_NAMES[slot]}</span>`;
        wrap.appendChild(sh);
        st.forEach(t=>{
          const item=document.createElement('div');item.className='task'+(t.done?' done':'');
          item.onclick=e=>{e.stopPropagation();toggle(curWeek,dag,t.idx);};
          item.innerHTML=`
            <div class="checkbox">
              <svg class="checkmark" width="11" height="11" viewBox="0 0 10 10" fill="none">
                <polyline points="1.5,5 4,7.5 8.5,2" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="task-body">
              <div class="task-label">${t.label}</div>
              ${t.note?`<div class="task-note">${t.note}</div>`:''}
            </div>
            <span class="chip chip-${t.badge}">${BL[t.badge]||''}</span>`;
          wrap.appendChild(item);
        });
        card.appendChild(wrap);
      });
    }
    main.appendChild(card);
  });
}
render();
</script>
</body>
